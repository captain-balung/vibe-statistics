name: Deploy to GitHub Pages

# push 到 main 後自動 build 並部署到 GitHub Pages。
# 對應 roadmap 0.2.1 / design.md 部署與環境。
on:
  push:
    branches: [main]
  workflow_dispatch:

# GitHub Pages 部署所需權限
permissions:
  contents: read
  pages: write
  id-token: write

# 同時間只跑一個部署，新的取代排隊中的
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
